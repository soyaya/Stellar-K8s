# Stellar-K8s Operator Configuration
# This file is mounted as a ConfigMap at /etc/stellar-operator/config.yaml

# Default resource requirements per node type
defaultResources:
  validator:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
  horizon:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "4Gi"
  sorobanRpc:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "4"
      memory: "8Gi"

# Reconciler configuration
reconciler:
  # Base requeue interval for healthy reconciliation loops (seconds)
  # Default: 60
  requeueInterval: 60

  # Base backoff duration for error retries (seconds)
  # Default: 15
  errorBackoffBase: 15

  # Maximum backoff duration (seconds)
  # Default: 300 (5 minutes)
  maxBackoff: 300

  # Enable jitter for backoff calculations
  # Adds randomness (0.5x to 1.5x) to prevent thundering herd
  # Default: true
  enableJitter: true

# OIDC authentication for the operator REST API (optional)
# When configured, the operator validates JWT bearer tokens against the
# specified OIDC provider and enforces role-based access control.
# Supported providers: GitHub, Google, Okta, or any standard OIDC issuer.
#
# Roles embedded in the JWT (via the `rolesClaim` field):
#   - "Reader" – read-only access to all GET endpoints
#   - "Admin"  – full access including mutating endpoints
#
# oidc:
#   issuer: "https://accounts.google.com"
#   audience: "stellar-operator"
#   jwksUri: "https://www.googleapis.com/oauth2/v3/certs"
#   rolesClaim: "roles"
