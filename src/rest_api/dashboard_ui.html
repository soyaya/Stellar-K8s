<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stellar-K8s Operator Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f172a; --surface: #1e293b; --border: #334155;
      --text: #e2e8f0; --muted: #94a3b8;
      --accent: #667eea; --accent2: #764ba2;
      --green: #10b981; --yellow: #f59e0b; --red: #ef4444; --blue: #3b82f6;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
           background: var(--bg); color: var(--text); line-height: 1.5; }
    #root { display: flex; flex-direction: column; min-height: 100vh; }
    button { cursor: pointer; border: none; font-family: inherit; }
    a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

/* ── helpers ── */
const API = window.location.origin;
const get = (url) => fetch(API + url).then(r => r.json());
const post = (url, body) => fetch(API + url, {
  method: 'POST', headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify(body)
}).then(r => r.json());

function useInterval(fn, ms) {
  const ref = useRef(fn);
  useEffect(() => { ref.current = fn; }, [fn]);
  useEffect(() => {
    const id = setInterval(() => ref.current(), ms);
    return () => clearInterval(id);
  }, [ms]);
}

/* ── design tokens ── */
const css = {
  card: { background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 12, padding: 24 },
  badge: (color) => ({
    display: 'inline-block', padding: '3px 10px', borderRadius: 12,
    fontSize: 12, fontWeight: 700, background: color, color: '#fff'
  }),
  btn: (color = 'var(--accent)') => ({
    background: color, color: '#fff', padding: '6px 14px',
    borderRadius: 8, fontSize: 13, fontWeight: 600,
    transition: 'opacity .15s'
  }),
  mono: { fontFamily: "'Courier New', monospace", fontSize: 13 },
};

const phaseColor = (p) => ({
  Ready: 'var(--green)', Running: 'var(--green)',
  Syncing: 'var(--yellow)', Creating: 'var(--blue)', Pending: 'var(--blue)',
  Failed: 'var(--red)', Degraded: 'var(--red)', Unknown: 'var(--muted)',
}[p] || 'var(--muted)');

/* ── Stat Card ── */
function StatCard({ label, value, color }) {
  return (
    <div style={{ ...css.card, flex: 1, minWidth: 160 }}>
      <div style={{ fontSize: 12, color: 'var(--muted)', marginBottom: 8 }}>{label}</div>
      <div style={{ fontSize: 36, fontWeight: 800, color: color || 'var(--text)' }}>{value ?? '—'}</div>
    </div>
  );
}

/* ── Toast ── */
function Toast({ msg, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 4000); return () => clearTimeout(t); }, []);
  const bg = type === 'error' ? 'var(--red)' : type === 'warn' ? 'var(--yellow)' : 'var(--green)';
  return (
    <div style={{
      position: 'fixed', bottom: 24, right: 24, background: bg, color: '#fff',
      padding: '12px 20px', borderRadius: 10, zIndex: 9999, maxWidth: 360,
      boxShadow: '0 4px 20px rgba(0,0,0,.4)', fontSize: 14
    }}>
      {msg}
      <button onClick={onClose} style={{ background: 'none', color: '#fff', marginLeft: 12, fontSize: 16 }}>×</button>
    </div>
  );
}

/* ── Modal ── */
function Modal({ title, onClose, children, wide }) {
  return (
    <div onClick={e => e.target === e.currentTarget && onClose()}
      style={{
        position: 'fixed', inset: 0, background: 'rgba(0,0,0,.75)',
        display: 'flex', alignItems: 'flex-start', justifyContent: 'center',
        padding: '40px 16px', zIndex: 1000, overflowY: 'auto'
      }}>
      <div style={{
        ...css.card, width: '100%', maxWidth: wide ? 960 : 720,
        position: 'relative'
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
          <h2 style={{ fontSize: 20, fontWeight: 700 }}>{title}</h2>
          <button onClick={onClose} style={{ background: 'none', color: 'var(--muted)', fontSize: 24, lineHeight: 1 }}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

/* ── Log Viewer ── */
function LogViewer({ lines, loading, error }) {
  const ref = useRef();
  useEffect(() => { if (ref.current) ref.current.scrollTop = ref.current.scrollHeight; }, [lines]);
  return (
    <div ref={ref} style={{
      ...css.mono, background: 'var(--bg)', padding: 16, borderRadius: 8,
      maxHeight: 480, overflowY: 'auto', whiteSpace: 'pre-wrap', wordBreak: 'break-all'
    }}>
      {loading && <span style={{ color: 'var(--muted)' }}>Loading logs…</span>}
      {error && <span style={{ color: 'var(--red)' }}>{error}</span>}
      {!loading && !error && (lines?.length
        ? lines.map((l, i) => <div key={i} style={{ color: l.includes('ERROR') ? 'var(--red)' : l.includes('WARN') ? 'var(--yellow)' : 'var(--text)' }}>{l}</div>)
        : <span style={{ color: 'var(--muted)' }}>No log lines available.</span>
      )}
    </div>
  );
}

/* ── Conditions Panel ── */
function ConditionsPanel({ conditions }) {
  if (!conditions?.length) return <p style={{ color: 'var(--muted)' }}>No conditions reported.</p>;
  const severityColor = (s) => ({ success: 'var(--green)', warning: 'var(--yellow)', error: 'var(--red)', info: 'var(--blue)' }[s] || 'var(--muted)');
  return (
    <ul style={{ listStyle: 'none', display: 'flex', flexDirection: 'column', gap: 10 }}>
      {conditions.map((c, i) => (
        <li key={i} style={{
          background: 'var(--bg)', padding: 14, borderRadius: 8,
          borderLeft: `4px solid ${severityColor(c.severity)}`
        }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
            <strong>{c.conditionType}</strong>
            <span style={css.badge(severityColor(c.severity))}>{c.status}</span>
          </div>
          {c.message && <div style={{ color: 'var(--muted)', fontSize: 13 }}>{c.message}</div>}
          {c.lastTransitionTime && (
            <div style={{ color: 'var(--muted)', fontSize: 12, marginTop: 4 }}>
              {new Date(c.lastTransitionTime).toLocaleString()}
            </div>
          )}
        </li>
      ))}
    </ul>
  );
}

/* ── Node Detail Modal ── */
function NodeDetailModal({ node, onClose, onToast }) {
  const [tab, setTab] = useState('conditions');
  const [conditions, setConditions] = useState(null);
  const [logs, setLogs] = useState(null);
  const [logsLoading, setLogsLoading] = useState(false);
  const [logsError, setLogsError] = useState(null);
  const [actionLoading, setActionLoading] = useState(null);

  useEffect(() => {
    get(`/api/v1/dashboard/nodes/${node.namespace}/${node.name}/conditions`)
      .then(d => setConditions(d.conditions))
      .catch(() => setConditions([]));
  }, [node]);

  const loadLogs = useCallback(() => {
    setLogsLoading(true); setLogsError(null);
    get(`/api/v1/dashboard/nodes/${node.namespace}/${node.name}/logs`)
      .then(d => { setLogs(d.logs ? d.logs.split('\n') : []); setLogsLoading(false); })
      .catch(e => { setLogsError(e.message); setLogsLoading(false); });
  }, [node]);

  useEffect(() => { if (tab === 'logs') loadLogs(); }, [tab]);

  const doAction = async (action) => {
    if (!confirm(`Run "${action}" on ${node.namespace}/${node.name}?`)) return;
    setActionLoading(action);
    try {
      const r = await post(`/api/v1/dashboard/nodes/${node.namespace}/${node.name}/actions`, { action });
      onToast(r.success ? r.message : (r.message || 'Action failed'), r.success ? 'ok' : 'error');
    } catch (e) {
      onToast(e.message, 'error');
    } finally {
      setActionLoading(null);
    }
  };

  const tabs = ['conditions', 'logs', 'actions'];
  const tabStyle = (t) => ({
    padding: '8px 18px', borderRadius: '8px 8px 0 0', fontWeight: 600, fontSize: 14,
    background: tab === t ? 'var(--bg)' : 'transparent',
    color: tab === t ? 'var(--text)' : 'var(--muted)',
    border: tab === t ? '1px solid var(--border)' : '1px solid transparent',
    borderBottom: tab === t ? '1px solid var(--bg)' : '1px solid var(--border)',
    marginBottom: -1,
  });

  return (
    <Modal title={`${node.namespace} / ${node.name}`} onClose={onClose} wide>
      <div style={{ display: 'flex', gap: 4, borderBottom: '1px solid var(--border)', marginBottom: 20 }}>
        {tabs.map(t => <button key={t} style={tabStyle(t)} onClick={() => setTab(t)}>{t.charAt(0).toUpperCase() + t.slice(1)}</button>)}
      </div>

      {tab === 'conditions' && (
        conditions ? <ConditionsPanel conditions={conditions} /> : <p style={{ color: 'var(--muted)' }}>Loading…</p>
      )}

      {tab === 'logs' && (
        <div>
          <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: 10 }}>
            <button style={css.btn()} onClick={loadLogs}>↺ Refresh</button>
          </div>
          <LogViewer lines={logs} loading={logsLoading} error={logsError} />
        </div>
      )}

      {tab === 'actions' && (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          {[
            { action: 'restart', label: '🔄 Restart Pods', color: 'var(--yellow)', desc: 'Delete all managed pods — Kubernetes will recreate them.' },
            { action: 'maintenance_mode', label: '🔧 Toggle Maintenance Mode', color: 'var(--blue)', desc: 'Flip the maintenanceMode flag on the StellarNode spec.' },
            { action: 'prune', label: '🗑 Prune Archives', color: 'var(--accent2)', desc: 'Request history archive pruning via annotation.' },
            { action: 'snapshot', label: '📸 Snapshot', color: 'var(--accent)', desc: 'Request a manual CSI VolumeSnapshot.' },
            { action: 'suspend', label: '⏸ Suspend', color: 'var(--muted)', desc: 'Set suspended: true — stops reconciliation.' },
            { action: 'resume', label: '▶ Resume', color: 'var(--green)', desc: 'Set suspended: false — resumes reconciliation.' },
          ].map(({ action, label, color, desc }) => (
            <div key={action} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 16,
              background: 'var(--bg)', padding: '14px 18px', borderRadius: 8 }}>
              <div>
                <div style={{ fontWeight: 600, marginBottom: 2 }}>{label}</div>
                <div style={{ fontSize: 13, color: 'var(--muted)' }}>{desc}</div>
              </div>
              <button
                style={{ ...css.btn(color), minWidth: 90, opacity: actionLoading === action ? 0.6 : 1 }}
                disabled={!!actionLoading}
                onClick={() => doAction(action)}
              >
                {actionLoading === action ? '…' : 'Run'}
              </button>
            </div>
          ))}
        </div>
      )}
    </Modal>
  );
}

/* ── Operator Logs Modal ── */
function OperatorLogsModal({ onClose }) {
  const [lines, setLines] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  const load = useCallback(() => {
    setLoading(true); setError(null);
    get('/api/v1/dashboard/operator/logs')
      .then(d => { setLines(d.logs); setLoading(false); })
      .catch(e => { setError(e.message); setLoading(false); });
  }, []);

  useEffect(() => { load(); }, []);

  return (
    <Modal title="Operator Logs" onClose={onClose} wide>
      <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: 10 }}>
        <button style={css.btn()} onClick={load}>↺ Refresh</button>
      </div>
      <LogViewer lines={lines} loading={loading} error={error} />
    </Modal>
  );
}

/* ── Nodes Table ── */
function NodesTable({ nodes, onSelect }) {
  if (!nodes) return <p style={{ color: 'var(--muted)', padding: 20 }}>Loading nodes…</p>;
  if (!nodes.length) return <p style={{ color: 'var(--muted)', padding: 20 }}>No StellarNode resources found.</p>;

  const th = { padding: '12px 16px', textAlign: 'left', fontWeight: 600, fontSize: 13,
    color: 'var(--muted)', borderBottom: '2px solid var(--border)', background: 'var(--bg)' };
  const td = { padding: '14px 16px', borderBottom: '1px solid var(--border)', fontSize: 14 };

  return (
    <div style={{ overflowX: 'auto' }}>
      <table style={{ width: '100%', borderCollapse: 'collapse' }}>
        <thead>
          <tr>
            {['Name', 'Namespace', 'Type', 'Network', 'Phase', 'Replicas', ''].map(h => (
              <th key={h} style={th}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {nodes.map(n => (
            <tr key={`${n.namespace}/${n.name}`}
              style={{ cursor: 'pointer', transition: 'background .1s' }}
              onMouseEnter={e => e.currentTarget.style.background = 'rgba(255,255,255,.03)'}
              onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
            >
              <td style={td}><strong>{n.name}</strong></td>
              <td style={{ ...td, color: 'var(--muted)' }}>{n.namespace}</td>
              <td style={td}><span style={css.badge('var(--blue)')}>{n.nodeType}</span></td>
              <td style={td}>{n.network}</td>
              <td style={td}><span style={css.badge(phaseColor(n.phase))}>{n.phase}</span></td>
              <td style={td}>{n.readyReplicas}/{n.replicas}</td>
              <td style={td}>
                <button style={css.btn()} onClick={() => onSelect(n)}>Details →</button>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

/* ── Fleet Health Bar ── */
function FleetHealthBar({ healthy, syncing, unhealthy, total }) {
  if (!total) return null;
  const pct = (n) => `${Math.round((n / total) * 100)}%`;
  return (
    <div style={{ marginTop: 16 }}>
      <div style={{ display: 'flex', height: 10, borderRadius: 6, overflow: 'hidden', gap: 2 }}>
        <div style={{ width: pct(healthy), background: 'var(--green)', transition: 'width .4s' }} title={`${healthy} healthy`} />
        <div style={{ width: pct(syncing), background: 'var(--yellow)', transition: 'width .4s' }} title={`${syncing} syncing`} />
        <div style={{ width: pct(unhealthy), background: 'var(--red)', transition: 'width .4s' }} title={`${unhealthy} unhealthy`} />
      </div>
      <div style={{ display: 'flex', gap: 16, marginTop: 8, fontSize: 12, color: 'var(--muted)' }}>
        <span>🟢 {healthy} healthy</span>
        <span>🟡 {syncing} syncing</span>
        <span>🔴 {unhealthy} unhealthy</span>
      </div>
    </div>
  );
}

/* ── Breakdown Pills ── */
function BreakdownPills({ label, data }) {
  return (
    <div style={{ ...css.card, flex: 1, minWidth: 200 }}>
      <div style={{ fontSize: 12, color: 'var(--muted)', marginBottom: 12 }}>{label}</div>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
        {Object.entries(data).filter(([, v]) => v > 0).map(([k, v]) => (
          <span key={k} style={{ ...css.badge('var(--accent)'), fontSize: 13 }}>{k}: {v}</span>
        ))}
        {Object.values(data).every(v => v === 0) && <span style={{ color: 'var(--muted)' }}>—</span>}
      </div>
    </div>
  );
}

/* ── App ── */
function App() {
  const [overview, setOverview] = useState(null);
  const [nodes, setNodes] = useState(null);
  const [selectedNode, setSelectedNode] = useState(null);
  const [showOperatorLogs, setShowOperatorLogs] = useState(false);
  const [toast, setToast] = useState(null);
  const [lastRefresh, setLastRefresh] = useState(null);
  const [loading, setLoading] = useState(false);

  const showToast = (msg, type = 'ok') => setToast({ msg, type });

  const refresh = useCallback(async () => {
    setLoading(true);
    try {
      const [ov, nl] = await Promise.all([
        get('/api/v1/dashboard/overview'),
        get('/api/v1/nodes'),
      ]);
      setOverview(ov);
      setNodes(nl.items);
      setLastRefresh(new Date());
    } catch (e) {
      showToast('Failed to load dashboard: ' + e.message, 'error');
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { refresh(); }, []);
  useInterval(refresh, 30000);

  return (
    <div style={{ maxWidth: 1400, margin: '0 auto', padding: '24px 20px' }}>
      {/* Header */}
      <div style={{
        background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
        borderRadius: 14, padding: '28px 32px', marginBottom: 28,
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        flexWrap: 'wrap', gap: 16
      }}>
        <div>
          <h1 style={{ fontSize: 28, fontWeight: 800, marginBottom: 4 }}>⭐ Stellar-K8s Dashboard</h1>
          <div style={{ opacity: .85, fontSize: 14 }}>
            Fleet health · CRD status · Reconciliation logs
            {lastRefresh && <span style={{ marginLeft: 12, opacity: .7 }}>
              Last updated {lastRefresh.toLocaleTimeString()}
            </span>}
          </div>
        </div>
        <div style={{ display: 'flex', gap: 10 }}>
          <button style={css.btn('rgba(255,255,255,.2)')} onClick={() => setShowOperatorLogs(true)}>
            📋 Operator Logs
          </button>
          <button style={{ ...css.btn('rgba(255,255,255,.2)'), opacity: loading ? .6 : 1 }}
            onClick={refresh} disabled={loading}>
            {loading ? '…' : '↺ Refresh'}
          </button>
        </div>
      </div>

      {/* Stats row */}
      <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap', marginBottom: 20 }}>
        <StatCard label="Total Nodes" value={overview?.totalNodes} />
        <StatCard label="Healthy" value={overview?.healthyNodes} color="var(--green)" />
        <StatCard label="Syncing" value={overview?.syncingNodes} color="var(--yellow)" />
        <StatCard label="Unhealthy" value={overview?.unhealthyNodes} color="var(--red)" />
      </div>

      {/* Fleet health bar */}
      {overview && (
        <div style={{ ...css.card, marginBottom: 20 }}>
          <div style={{ fontWeight: 700, marginBottom: 4 }}>Fleet Health</div>
          <FleetHealthBar
            healthy={overview.healthyNodes}
            syncing={overview.syncingNodes}
            unhealthy={overview.unhealthyNodes}
            total={overview.totalNodes}
          />
        </div>
      )}

      {/* Breakdowns */}
      {overview && (
        <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap', marginBottom: 28 }}>
          <BreakdownPills label="By Node Type" data={overview.nodesByType} />
          <BreakdownPills label="By Network" data={overview.nodesByNetwork} />
        </div>
      )}

      {/* Nodes table */}
      <div style={{ ...css.card }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
          <h2 style={{ fontSize: 20, fontWeight: 700 }}>Managed StellarNodes</h2>
          <span style={{ fontSize: 13, color: 'var(--muted)' }}>
            {nodes ? `${nodes.length} resource${nodes.length !== 1 ? 's' : ''}` : ''}
          </span>
        </div>
        <NodesTable nodes={nodes} onSelect={setSelectedNode} />
      </div>

      {/* Modals */}
      {selectedNode && (
        <NodeDetailModal
          node={selectedNode}
          onClose={() => setSelectedNode(null)}
          onToast={showToast}
        />
      )}
      {showOperatorLogs && <OperatorLogsModal onClose={() => setShowOperatorLogs(false)} />}
      {toast && <Toast msg={toast.msg} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
