# Default values for stellar-operator
# This is a YAML-formatted file.

replicaCount: 1

image:
  repository: ghcr.io/stellar/stellar-k8s
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use
  name: ""

# Configuration for secrets
# It can generate standard Kubernetes Secrets or ExternalSecrets mapping to an external store
secrets:
  # Whether to create secret manifests
  create: false
  # Set to true to generate ExternalSecret manifests instead of standard Secret manifests
  useExternalSecrets: false
  # Applicable only when useExternalSecrets is true
  externalSecret:
    # the name of the SecretStore or ClusterSecretStore
    secretStoreRef:
      name: "aws-secrets"
      kind: "ClusterSecretStore"
    # the refresh interval for the ExternalSecret
    refreshInterval: "1h"
  # Define the secrets here
  # For useExternalSecrets: true, 'value' is used as the remoteRef key.
  # For useExternalSecrets: false, 'value' is base64 encoded into a standard K8s Secret.
  items: {}
  # Example:
  # items:
  #   validator-seed:
  #     key: STELLAR_CORE_SEED
  #     value: "my-validator-seed-value" # or remoteRef key if useExternalSecrets: true
  #   horizon-db:
  #     key: DATABASE_URL
  #     value: "my-db-url"

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9090"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

# PodDisruptionBudget configuration for operator deployment
podDisruptionBudget:
  enabled: false

# Operator configuration
operator:
  # Log level: debug, info, warn, error
  logLevel: info
  # Enable REST API
  restApiEnabled: true
  # REST API port
  restApiPort: 9090
  # Metrics port
  metricsPort: 9090
  # Namespace to watch (empty = all namespaces)
  watchNamespace: ""

# Diagnostic sidecar configuration
sidecar:
  enabled: true
  image:
    repository: ghcr.io/stellar/stellar-k8s
    tag: ""
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 100m
      memory: 64Mi
    requests:
      cpu: 50m
      memory: 32Mi

# Service for REST API and metrics
service:
  type: ClusterIP
  restApiPort: 9090
  metricsPort: 9090

# Default resource requests/limits for managed StellarNode pods.
# Precedence: StellarNode spec.resources > Helm defaults > operator hardcoded fallback.
# These are written into a ConfigMap that the operator reads at startup.
defaultResources:
  validator:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
  horizon:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "4Gi"
  sorobanRpc:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "4"
      memory: "8Gi"
      

# Feature flags — toggle operator capabilities at runtime without restart.
featureFlags:
  enableCveScanning: false
  enableReadPool: false
  enableDr: false
  enablePeerDiscovery: true
  enableArchiveHealth: true
  enableSorobanMetrics: false
  enableArchiveHealth: "false"


security:
  audit:
    enabled: true
    logLevel: "Audit"
  podSecurityStandard: "restricted"
  falco:
    enabled: true
  networkPolicy:
    enabled: true
    ingress:
      namespaceSelector: true
  admissionWebhook:
    failurePolicy: Fail
  imagePolicy:
    allowLatestTag: false

# Network Isolation — prevents cross-network traffic between Mainnet and Testnet namespaces.
#
# When enabled, the Helm chart deploys namespace-level NetworkPolicies that block
# all ingress and egress between namespaces labelled with different stellar.org/network
# values. This is a second layer of defence on top of the per-node NetworkPolicies
# generated by the operator reconciler.
#
# The operator reconciler also enforces isolation at the control-plane level:
# if a StellarNode is created in a namespace that already contains a node for a
# different network, reconciliation is blocked with error SK8S-021.
#
# Quick start:
#   1. Label your namespaces:
#        kubectl label namespace stellar-mainnet stellar.org/network=mainnet
#        kubectl label namespace stellar-testnet stellar.org/network=testnet
#   2. Set networkIsolation.enabled=true and list the namespaces below.
#   3. Helm upgrade.
networkIsolation:
  # Master switch. Set to true to deploy namespace-level isolation policies.
  enabled: false

  # When true, the Helm chart will patch the release namespace with the
  # stellar.org/network label specified in releaseNamespaceNetwork.
  labelReleaseNamespace: false

  # The network label value to apply to the release namespace.
  # Must be one of: mainnet, testnet, futurenet, or a custom-<hash> value.
  releaseNamespaceNetwork: ""

  # List of namespaces that host Mainnet nodes.
  # The chart will deploy deny-non-mainnet-ingress and deny-non-mainnet-egress
  # NetworkPolicies into each of these namespaces.
  mainnetNamespaces: []
  # Example:
  # mainnetNamespaces:
  #   - stellar-mainnet
  #   - stellar-mainnet-horizon

  # List of namespaces that host Testnet nodes.
  testnetNamespaces: []
  # Example:
  # testnetNamespaces:
  #   - stellar-testnet
  #   - stellar-testnet-horizon

  # When true, ingress from and egress to the monitoring namespace is allowed
  # so Prometheus can scrape metrics from Stellar pods.
  allowMonitoringNamespace: true

  # The namespace where Prometheus / monitoring tools run.
  monitoringNamespace: "monitoring"

# Byzantine Monitoring Watcher configuration
#
# Deploys lightweight `stellar-watcher` sidecars in multiple geographic regions
# to detect local vs. global consensus issues (Byzantine partition detection).
#
# Each watcher independently polls a Stellar Core node and exports Prometheus
# metrics. A central Prometheus instance aggregates all watchers and fires an
# alert when >20% disagree on the current ledger hash.
#
# Quick start:
#   1. Enable the watcher: byzantineWatcher.enabled=true
#   2. Configure at least 3 regions for reliable detection.
#   3. Apply the PrometheusRule: kubectl apply -f monitoring/byzantine-alerts.yaml
#   4. Import the Grafana dashboard: monitoring/byzantine-dashboard.json
#
# See docs/byzantine-monitoring.md for full setup instructions.
byzantineWatcher:
  # Master switch. Set to true to deploy watcher Deployments.
  enabled: false

  # Container image for the watcher binary.
  # Defaults to the same image as the operator (stellar-watcher binary is included).
  image:
    repository: ""   # defaults to .Values.image.repository
    tag: ""          # defaults to .Values.image.tag / chart appVersion
    pullPolicy: IfNotPresent

  # Default Stellar network for all watchers (can be overridden per region).
  defaultNetwork: "mainnet"

  # How often each watcher polls its Stellar Core node (seconds).
  pollIntervalSecs: 10

  # HTTP request timeout for Stellar Core polls (seconds).
  requestTimeoutSecs: 5

  # Port for the Prometheus /metrics endpoint on each watcher pod.
  metricsPort: 9101

  # Log level for watcher pods.
  logLevel: "info"

  # Resource requests/limits for each watcher pod.
  resources:
    limits:
      cpu: 100m
      memory: 64Mi
    requests:
      cpu: 25m
      memory: 32Mi

  # List of geographic vantage points to deploy watchers in.
  # Each entry creates one Deployment + Service.
  #
  # Required fields per region:
  #   cloud:        Cloud provider label (aws / gcp / azure / on-prem)
  #   region:       Geographic region label (us-east-1 / eu-west-1 / …)
  #   nodeEndpoint: HTTP endpoint of the Stellar Core node to poll
  #
  # Optional fields per region:
  #   network:      Override defaultNetwork for this watcher
  #
  # Example — 5-region setup across 3 cloud providers:
  # regions:
  #   - cloud: aws
  #     region: us-east-1
  #     nodeEndpoint: http://stellar-core.stellar-system.svc.cluster.local:11626
  #   - cloud: aws
  #     region: us-west-2
  #     nodeEndpoint: http://stellar-core-usw2.stellar-system.svc.cluster.local:11626
  #   - cloud: gcp
  #     region: eu-west-1
  #     nodeEndpoint: http://stellar-core-eu.stellar-system.svc.cluster.local:11626
  #   - cloud: azure
  #     region: ap-south-1
  #     nodeEndpoint: http://stellar-core-ap.stellar-system.svc.cluster.local:11626
  #   - cloud: on-prem
  #     region: dc-frankfurt
  #     nodeEndpoint: http://10.0.1.50:11626
  regions: []
