{{- /*
  Network Isolation — cluster-level NetworkPolicies
  =================================================
  These policies enforce hard boundaries between Mainnet and Testnet namespaces.
  They are applied at the namespace level (not per-pod) and act as a second
  layer of defence on top of the per-node NetworkPolicies generated by the
  operator reconciler.

  Architecture
  ------------
  Two complementary policies are created per network type:

  1. deny-cross-network-ingress  — drops all ingress from namespaces that carry
     a *different* stellar.org/network label.

  2. deny-cross-network-egress   — drops all egress to namespaces that carry a
     *different* stellar.org/network label.

  Together they guarantee that even if a pod's per-node NetworkPolicy is
  accidentally deleted or misconfigured, the namespace-level policies still
  block cross-network traffic.

  Namespace labelling
  -------------------
  Every namespace that hosts Stellar nodes must carry:

    stellar.org/network: mainnet   # or testnet / futurenet

  The operator reconciler enforces this at runtime (SK8S-021).
  The Helm chart stamps the label on the release namespace when
  networkIsolation.labelReleaseNamespace is true (default).

  Usage
  -----
  Enable via values:

    networkIsolation:
      enabled: true
      mainnetNamespaces:
        - stellar-mainnet
      testnetNamespaces:
        - stellar-testnet
*/}}

{{- if .Values.networkIsolation.enabled }}

{{- /* ------------------------------------------------------------------ */}}
{{- /* Label the release namespace if requested                            */}}
{{- /* ------------------------------------------------------------------ */}}
{{- if .Values.networkIsolation.labelReleaseNamespace }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Release.Namespace }}
  labels:
    {{- include "stellar-operator.labels" . | nindent 4 }}
    {{- if .Values.networkIsolation.releaseNamespaceNetwork }}
    stellar.org/network: {{ .Values.networkIsolation.releaseNamespaceNetwork | quote }}
    {{- end }}
---
{{- end }}

{{- /* ------------------------------------------------------------------ */}}
{{- /* Per-network deny policies                                           */}}
{{- /* ------------------------------------------------------------------ */}}

{{- /*
  For each declared Mainnet namespace: deny ingress/egress from/to any
  namespace that is NOT labelled stellar.org/network=mainnet.
*/}}
{{- range .Values.networkIsolation.mainnetNamespaces }}
---
# Deny ingress into Mainnet namespace from non-Mainnet namespaces
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-non-mainnet-ingress
  namespace: {{ . | quote }}
  labels:
    app.kubernetes.io/managed-by: stellar-operator
    stellar.org/network: mainnet
    stellar.org/policy-type: network-isolation
  annotations:
    stellar.org/isolation-description: >
      Blocks all ingress traffic from namespaces that are not labelled
      stellar.org/network=mainnet. This prevents Testnet or unknown pods
      from connecting to Mainnet nodes.
spec:
  podSelector: {}  # applies to ALL pods in this namespace
  policyTypes:
    - Ingress
  ingress:
    # Allow ingress only from pods in namespaces labelled mainnet
    - from:
        - namespaceSelector:
            matchLabels:
              stellar.org/network: mainnet
    # Allow ingress from kube-system (DNS, health checks, metrics)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
    # Allow ingress from the operator namespace (reconciler health probes)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $.Release.Namespace | quote }}
    {{- if $.Values.networkIsolation.allowMonitoringNamespace }}
    # Allow ingress from the monitoring namespace (Prometheus scraping)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $.Values.networkIsolation.monitoringNamespace | default "monitoring" | quote }}
    {{- end }}
---
# Deny egress from Mainnet namespace to non-Mainnet namespaces
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-non-mainnet-egress
  namespace: {{ . | quote }}
  labels:
    app.kubernetes.io/managed-by: stellar-operator
    stellar.org/network: mainnet
    stellar.org/policy-type: network-isolation
  annotations:
    stellar.org/isolation-description: >
      Blocks all egress traffic to namespaces that are not labelled
      stellar.org/network=mainnet. This prevents Mainnet nodes from
      accidentally connecting to Testnet peers or databases.
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # Allow egress only to pods in namespaces labelled mainnet
    - to:
        - namespaceSelector:
            matchLabels:
              stellar.org/network: mainnet
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow egress to the operator namespace (status updates, events)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $.Release.Namespace | quote }}
    {{- if $.Values.networkIsolation.allowMonitoringNamespace }}
    # Allow egress to monitoring namespace (push metrics)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $.Values.networkIsolation.monitoringNamespace | default "monitoring" | quote }}
    {{- end }}
{{- end }}

{{- /*
  For each declared Testnet namespace: deny ingress/egress from/to any
  namespace that is NOT labelled stellar.org/network=testnet.
*/}}
{{- range .Values.networkIsolation.testnetNamespaces }}
---
# Deny ingress into Testnet namespace from non-Testnet namespaces
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-non-testnet-ingress
  namespace: {{ . | quote }}
  labels:
    app.kubernetes.io/managed-by: stellar-operator
    stellar.org/network: testnet
    stellar.org/policy-type: network-isolation
  annotations:
    stellar.org/isolation-description: >
      Blocks all ingress traffic from namespaces that are not labelled
      stellar.org/network=testnet. This prevents Mainnet or unknown pods
      from connecting to Testnet nodes.
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              stellar.org/network: testnet
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $.Release.Namespace | quote }}
    {{- if $.Values.networkIsolation.allowMonitoringNamespace }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $.Values.networkIsolation.monitoringNamespace | default "monitoring" | quote }}
    {{- end }}
---
# Deny egress from Testnet namespace to non-Testnet namespaces
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-non-testnet-egress
  namespace: {{ . | quote }}
  labels:
    app.kubernetes.io/managed-by: stellar-operator
    stellar.org/network: testnet
    stellar.org/policy-type: network-isolation
  annotations:
    stellar.org/isolation-description: >
      Blocks all egress traffic to namespaces that are not labelled
      stellar.org/network=testnet. This prevents Testnet nodes from
      accidentally connecting to Mainnet peers or databases.
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              stellar.org/network: testnet
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $.Release.Namespace | quote }}
    {{- if $.Values.networkIsolation.allowMonitoringNamespace }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $.Values.networkIsolation.monitoringNamespace | default "monitoring" | quote }}
    {{- end }}
{{- end }}

{{- end }}{{- /* end networkIsolation.enabled */}}
